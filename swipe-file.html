<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propello — Swipe File</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #000; color: #fff; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    .container { max-width: 800px; margin: 0 auto; padding: 0 32px; }
    nav { width: 100%; padding: 16px 0; background: rgba(15,23,40,0.95); border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
    .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; }
    .logo-mark { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-icon { background: linear-gradient(135deg,#6C63FF,#3B82F6); color: #fff; font-weight: 900; width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .logo-text { display: flex; flex-direction: column; }
    .logo-top { font-size: 0.95rem; font-weight: 700; color: #fff; line-height: 1.1; }
    .logo-bottom { font-size: 0.65rem; font-weight: 600; color: #FF7300; letter-spacing: 0.06em; text-transform: uppercase; }
    .page-header { background: linear-gradient(135deg, #1a2744 0%, #0F1728 40%, #06b6d4 100%); padding: 64px 0; text-align: center; }
    .page-header h1 { font-size: 2.5rem; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .page-header p { font-size: 1.1rem; color: rgba(255,255,255,0.8); max-width: 500px; margin: 0 auto; }
    .page-content { background: #0F1728; padding: 48px 0; }

    .filter-row { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: #9ca3af; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { border-color: #FF7300; color: #fff; }
    .filter-btn.active { background: #FF7300; border-color: #FF7300; color: #fff; }

    .swipe-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .swipe-card { background: #1a2744; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 20px; position: relative; }
    .swipe-card .type-tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px; }
    .type-tag.hook { background: rgba(255,115,0,0.15); color: #FF7300; }
    .type-tag.opening { background: rgba(6,182,212,0.15); color: #06b6d4; }
    .type-tag.cta { background: rgba(108,99,255,0.15); color: #6C63FF; }
    .type-tag.close { background: rgba(239,68,68,0.15); color: #ef4444; }
    .swipe-text { font-size: 1rem; color: rgba(255,255,255,0.9); line-height: 1.6; margin-bottom: 12px; font-style: italic; }
    .swipe-use { font-size: 0.8rem; color: #9ca3af; }
    .copy-swipe { position: absolute; top: 16px; right: 16px; padding: 6px 12px; border-radius: 6px; background: rgba(255,255,255,0.06); border: none; color: #9ca3af; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
    .copy-swipe:hover { background: #FF7300; color: #fff; }
    .copy-swipe.copied { background: #06b6d4; color: #fff; }

    .back-link { display: inline-flex; align-items: center; gap: 8px; color: #9ca3af; font-size: 0.9rem; text-decoration: none; margin-bottom: 24px; }
    .back-link:hover { color: #FF7300; }
    footer { background: #0F1728; border-top: 1px solid rgba(255,255,255,0.06); padding: 48px 0; }
    footer p { font-size: 0.875rem; color: #9ca3af; text-align: center; }
    .footer-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo-mark">
      <div class="logo-icon">P</div>
      <div class="logo-text"><span class="logo-top">PROPELLO</span><span class="logo-bottom">AI PROPOSAL BUILDER</span></div>
    </a>
    <a href="/members" style="color:#fff;font-size:0.85rem;font-weight:600;text-decoration:none;">← Dashboard</a>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>📁 Swipe File</h1>
    <p>Proven hooks, openings, and closings used by top-earning freelancers.</p>
  </div>
</div>

<div class="page-content">
  <div class="container">
    <a href="/members" class="back-link">← Back to Dashboard</a>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="hook">Hooks</button>
      <button class="filter-btn" data-filter="opening">Openings</button>
      <button class="filter-btn" data-filter="cta">CTAs</button>
      <button class="filter-btn" data-filter="close">Closers</button>
    </div>

    <div class="swipe-grid" id="swipe-grid">
      <!-- Swipe file items loaded by JS -->
    </div>
  </div>
</div>

<footer>
  <div class="footer-inner"><p>© 2026 Propello. All rights reserved.</p></div>
</footer>

<script>
const swipeItems = [
  { type: 'hook', text: '"I read your post and I think I\'ve solved half your problem before we even talk."', use: 'Curiosity hook — makes them want to know more' },
  { type: 'hook', text: '"You need X. Most people applying will tell you they can do it. I\'ll show you how I\'ve done it before."', use: 'Confidence + proof in one sentence' },
  { type: 'hook', text: '"I\'m only going to write 3 paragraphs. If they don\'t convince you by the end, I don\'t deserve the job."', use: 'Bold framing — shows confidence, respects their time' },
  { type: 'hook', text: '"I\'ve done 14 projects exactly like this. Here\'s what I learned."', use: 'Authority through specificity' },
  { type: 'hook', text: '"This isn\'t a template. I\'m writing this specifically for your project because <specific detail> caught my attention."', use: 'Personalization signal — proves you read the brief' },
  { type: 'opening', text: '"Your project stood out to me because most people asking for <X> don\'t realize they actually need <Y>."', use: 'Shows deeper understanding than competitors' },
  { type: 'opening', text: '"I\'ve been where you are. I spent months trying to solve <problem> before I figured out the system I\'ll describe below."', use: 'Empathy + authority — you\'ve walked the path' },
  { type: 'opening', text: '"Quick story: A client came to me with the same exact brief last year. Here\'s what we built and what it did for their business."', use: 'Case study into opening — proof first' },
  { type: 'opening', text: '"I noticed you mentioned <specific detail> in your post. Most people would skip that, but it\'s actually the most important part."', use: 'Attention to detail = professional signal' },
  { type: 'opening', text: '"I\'m not going to tell you I\'m the best. I\'ll let my previous results speak for themselves."', use: 'Humble confidence — shows without telling' },
  { type: 'cta', text: '"If this makes sense, I\'d love to jump on a quick call to talk through the details. No pitch — just a conversation."', use: 'Low-pressure CTA, removes sales pressure' },
  { type: 'cta', text: '"I\'m available to start tomorrow. If you\'re interested, reply with a time that works and I\'ll send over a proposal outline."', use: 'Action-oriented, shows readiness' },
  { type: 'cta', text: '"Want to see a quick example of how I\'d approach this? I can put together a sample for <one small piece> to show you my thinking."', use: 'Risk reversal — let them try before they commit' },
  { type: 'cta', text: '"If you\'re the right fit for me as much as I\'m the right fit for you, let\'s set up a 10-minute call to see if we click."', use: 'Mutual fit framing — positions you as selective' },
  { type: 'cta', text: '"Shoot me a message if you want to discuss scope and timeline. I respond within 2 hours."', use: 'Simple, fast, reliable signal' },
  { type: 'close', text: '"Bottom line: I can deliver <result> in <timeframe>. If that works for your timeline, I\'m ready when you are."', use: 'Direct, no-fluff closer' },
  { type: 'close', text: '"I don\'t want to waste your time with a long pitch. You need <X>, I do <X>, and I\'ve done it for <Y>. Let\'s talk."', use: 'Respects their time, gets to the point' },
  { type: 'close', text: '"I\'m confident I can deliver what you\'re looking for. But don\'t take my word for it — let me show you."', use: 'Confidence without arrogance, leads to action' },
  { type: 'close', text: '"The best way to know if we\'re a fit is to try. I\'m offering a no-commitment sample of my work on one small piece."', use: 'Risk-free trial closes skeptical clients' },
  { type: 'close', text: '"Thanks for considering me. Whether it\'s this project or a future one, I\'d be glad to help."', use: 'Graceful close — keeps the door open even if they pass' },
];

function renderSwipes(filter) {
  const grid = document.getElementById('swipe-grid');
  const filtered = filter === 'all' ? swipeItems : swipeItems.filter(s => s.type === filter);
  grid.innerHTML = filtered.map(s => `
    <div class="swipe-card" data-type="${s.type}">
      <span class="type-tag ${s.type}">${s.type}</span>
      <button class="copy-swipe" onclick="copySwipe(this, \`${s.text.replace(/`/g, '\\`')}\`)">📋 Copy</button>
      <div class="swipe-text">"${s.text}"</div>
      <div class="swipe-use">💡 ${s.use}</div>
    </div>
  `).join('');
}

function copySwipe(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderSwipes(btn.dataset.filter);
  });
});

renderSwipes('all');
</script>
</body>
</html>
